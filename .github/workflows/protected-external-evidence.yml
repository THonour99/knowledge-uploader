name: Protected external evidence collector

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Protected environment where the operational drills were executed
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

permissions:
  contents: read

jobs:
  collect-protected-evidence:
    runs-on:
      - self-hosted
      - Linux
      - protected-evidence
    timeout-minutes: 30
    environment:
      name: ${{ inputs.environment }}
    env:
      RELEASE_ENVIRONMENT: ${{ inputs.environment }}
      PROTECTED_EVIDENCE_SOURCE_DIR: ${{ vars.PROTECTED_EVIDENCE_SOURCE_DIR }}
      PROMETHEUS_VALIDATOR_IMAGE: prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
      ALERTMANAGER_VALIDATOR_IMAGE: prom/alertmanager:v0.28.1@sha256:27c475db5fb156cab31d5c18a4251ac7ed567746a2483ff264516437a39b15ba
    steps:
      - name: Checkout exact release revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install evidence parser dependency
        run: |
          python -m pip install --require-hashes --only-binary=:all: -r ops/requirements-protected-evidence.txt

      - name: Require protected evidence mount
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          raw = os.environ.get("PROTECTED_EVIDENCE_SOURCE_DIR", "").strip()
          if not raw:
              raise SystemExit("PROTECTED_EVIDENCE_SOURCE_DIR environment variable is required")
          source = Path(raw)
          if not source.is_absolute() or not source.is_dir():
              raise SystemExit("protected evidence source must be an existing absolute directory")
          PY

      - name: Validate and assemble external evidence
        run: |
          python scripts/prepare_external_release_evidence.py \
            --source-dir "$PROTECTED_EVIDENCE_SOURCE_DIR" \
            --output-dir artifacts/external \
            --git-sha "${{ github.sha }}" \
            --environment "$RELEASE_ENVIRONMENT" \
            --collector-run-id "${{ github.run_id }}" \
            --collector-run-attempt "${{ github.run_attempt }}" \
            --prometheus-image "$PROMETHEUS_VALIDATOR_IMAGE" \
            --alertmanager-image "$ALERTMANAGER_VALIDATOR_IMAGE"

      - name: Upload protected external evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: protected-release-external-evidence-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/external
          if-no-files-found: error
          retention-days: 7
