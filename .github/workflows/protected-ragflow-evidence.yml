name: Protected RAGFlow live evidence

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Protected environment owning the isolated RAGFlow evidence dataset
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      main_ci_run_id:
        description: Successful main CI run that built the immutable release artifact
        required: true
        type: string
      main_ci_run_attempt:
        description: Exact attempt of the successful main CI run
        required: true
        type: string
      nonce:
        description: Unique base64url nonce bound by both owner attestations
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: protected-ragflow-evidence-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  collect-protected-ragflow-evidence:
    runs-on:
      - self-hosted
      - Linux
      - X64
      - protected-ragflow-evidence
    timeout-minutes: 30
    environment:
      name: ${{ inputs.environment }}
    env:
      PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}/scripts
      RELEASE_ENVIRONMENT: ${{ inputs.environment }}
      MAIN_CI_RUN_ID: ${{ inputs.main_ci_run_id }}
      MAIN_CI_RUN_ATTEMPT: ${{ inputs.main_ci_run_attempt }}
      EVIDENCE_NONCE: ${{ inputs.nonce }}
    steps:
      - name: Checkout exact release revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up pinned Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ops/requirements-protected-ragflow-evidence.txt

      - name: Install hash-locked evidence runtime
        run: >-
          python -m pip install --require-hashes --only-binary=:all:
          -r ops/requirements-protected-ragflow-evidence.txt

      - name: Verify protected ref and main CI provenance
        id: trust
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/release_workflow_trust.py fetch \
            --repository "${GITHUB_REPOSITORY}" \
            --git-sha "${GITHUB_SHA}" \
            --ref "${GITHUB_REF}" \
            --ref-protected "${{ github.ref_protected }}" \
            --current-role ragflow_live \
            --current-run-id "${GITHUB_RUN_ID}" \
            --current-run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --current-workflow .github/workflows/protected-ragflow-evidence.yml \
            --main-run-id "${MAIN_CI_RUN_ID}" \
            --main-run-attempt "${MAIN_CI_RUN_ATTEMPT}" \
            --output artifacts/trust/release-workflow-trust.json

      - name: Materialize signed deployment proof without logging it
        id: prepare
        env:
          APPLICATION_DEPLOYMENT_ATTESTATION_JSON: >-
            ${{ secrets.APPLICATION_DEPLOYMENT_ATTESTATION_JSON }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          raw = os.environ["APPLICATION_DEPLOYMENT_ATTESTATION_JSON"].encode("utf-8")
          if not raw or len(raw) > 65536 or b"\x00" in raw:
              raise SystemExit("deployment attestation input invalid")
          directory = Path("artifacts/private")
          directory.mkdir(parents=True, exist_ok=False, mode=0o700)
          target = directory / "application-deployment-owner-attestation.json"
          descriptor = os.open(target, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
          with os.fdopen(descriptor, "wb") as stream:
              stream.write(raw)
              stream.flush()
              os.fsync(stream.fileno())
          PY

      - name: Run owner-authorized application-to-RAGFlow live probe
        id: probe
        env:
          KU_APP_BASE_URL: ${{ secrets.KU_APP_BASE_URL }}
          KU_APP_TLS_SPKI_PIN: ${{ vars.KU_APP_TLS_SPKI_PIN }}
          KU_EMPLOYEE_EMAIL: ${{ secrets.KU_EMPLOYEE_EMAIL }}
          KU_EMPLOYEE_PASSWORD: ${{ secrets.KU_EMPLOYEE_PASSWORD }}
          KU_ADMIN_EMAIL: ${{ secrets.KU_ADMIN_EMAIL }}
          KU_ADMIN_PASSWORD: ${{ secrets.KU_ADMIN_PASSWORD }}
          KU_DATASET_MAPPING_ID: ${{ vars.KU_DATASET_MAPPING_ID }}
          KU_RAGFLOW_BASE_URL: ${{ secrets.KU_RAGFLOW_BASE_URL }}
          KU_RAGFLOW_API_KEY: ${{ secrets.KU_RAGFLOW_API_KEY }}
          KU_RAGFLOW_DATASET_ID: ${{ vars.KU_RAGFLOW_DATASET_ID }}
          KU_RAGFLOW_TLS_SPKI_PIN: ${{ vars.KU_RAGFLOW_TLS_SPKI_PIN }}
          RAGFLOW_OWNER_ATTESTATION_PATH: ${{ vars.RAGFLOW_OWNER_ATTESTATION_PATH }}
          RAGFLOW_OWNER_POLICY_PATH: ${{ vars.RAGFLOW_OWNER_POLICY_PATH }}
          RAGFLOW_OWNER_POLICY_SHA256: ${{ vars.RAGFLOW_OWNER_POLICY_SHA256 }}
          APPLICATION_DEPLOYMENT_IDENTITY_SHA256: >-
            ${{ vars.APPLICATION_DEPLOYMENT_IDENTITY_SHA256 }}
          APPLICATION_DEPLOYMENT_OWNER_POLICY_PATH: >-
            ${{ vars.APPLICATION_DEPLOYMENT_OWNER_POLICY_PATH }}
          APPLICATION_DEPLOYMENT_OWNER_POLICY_SHA256: >-
            ${{ vars.APPLICATION_DEPLOYMENT_OWNER_POLICY_SHA256 }}
        run: |
          python scripts/run_ragflow_live_evidence.py probe \
            --environment "${RELEASE_ENVIRONMENT}" \
            --repository "${GITHUB_REPOSITORY}" \
            --git-sha "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --main-run-id "${MAIN_CI_RUN_ID}" \
            --main-run-attempt "${MAIN_CI_RUN_ATTEMPT}" \
            --nonce "${EVIDENCE_NONCE}" \
            --workflow-trust artifacts/trust/release-workflow-trust.json \
            --owner-attestation "${RAGFLOW_OWNER_ATTESTATION_PATH}" \
            --owner-policy "${RAGFLOW_OWNER_POLICY_PATH}" \
            --owner-policy-sha256 "${RAGFLOW_OWNER_POLICY_SHA256}" \
            --deployment-attestation \
              artifacts/private/application-deployment-owner-attestation.json \
            --deployment-policy "${APPLICATION_DEPLOYMENT_OWNER_POLICY_PATH}" \
            --deployment-policy-sha256 "${APPLICATION_DEPLOYMENT_OWNER_POLICY_SHA256}" \
            --deployment-identity-sha256 "${APPLICATION_DEPLOYMENT_IDENTITY_SHA256}" \
            --janitor-manifest artifacts/private/ragflow-live-janitor-manifest.json \
            --output artifacts/private/ragflow-live-probe.json

      - name: Independently clean and confirm the isolated dataset
        id: janitor
        if: >-
          ${{ always() && steps.trust.outcome == 'success' &&
              steps.prepare.outcome == 'success' }}
        env:
          KU_APP_BASE_URL: ${{ secrets.KU_APP_BASE_URL }}
          KU_APP_TLS_SPKI_PIN: ${{ vars.KU_APP_TLS_SPKI_PIN }}
          KU_EMPLOYEE_EMAIL: ${{ secrets.KU_EMPLOYEE_EMAIL }}
          KU_EMPLOYEE_PASSWORD: ${{ secrets.KU_EMPLOYEE_PASSWORD }}
          KU_ADMIN_EMAIL: ${{ secrets.KU_ADMIN_EMAIL }}
          KU_ADMIN_PASSWORD: ${{ secrets.KU_ADMIN_PASSWORD }}
          KU_DATASET_MAPPING_ID: ${{ vars.KU_DATASET_MAPPING_ID }}
          KU_RAGFLOW_BASE_URL: ${{ secrets.KU_RAGFLOW_BASE_URL }}
          KU_RAGFLOW_API_KEY: ${{ secrets.KU_RAGFLOW_API_KEY }}
          KU_RAGFLOW_DATASET_ID: ${{ vars.KU_RAGFLOW_DATASET_ID }}
          KU_RAGFLOW_TLS_SPKI_PIN: ${{ vars.KU_RAGFLOW_TLS_SPKI_PIN }}
          RAGFLOW_OWNER_ATTESTATION_PATH: ${{ vars.RAGFLOW_OWNER_ATTESTATION_PATH }}
          RAGFLOW_OWNER_POLICY_PATH: ${{ vars.RAGFLOW_OWNER_POLICY_PATH }}
          RAGFLOW_OWNER_POLICY_SHA256: ${{ vars.RAGFLOW_OWNER_POLICY_SHA256 }}
          APPLICATION_DEPLOYMENT_IDENTITY_SHA256: >-
            ${{ vars.APPLICATION_DEPLOYMENT_IDENTITY_SHA256 }}
          APPLICATION_DEPLOYMENT_OWNER_POLICY_PATH: >-
            ${{ vars.APPLICATION_DEPLOYMENT_OWNER_POLICY_PATH }}
          APPLICATION_DEPLOYMENT_OWNER_POLICY_SHA256: >-
            ${{ vars.APPLICATION_DEPLOYMENT_OWNER_POLICY_SHA256 }}
        run: |
          python scripts/run_ragflow_live_evidence.py janitor \
            --environment "${RELEASE_ENVIRONMENT}" \
            --repository "${GITHUB_REPOSITORY}" \
            --git-sha "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --main-run-id "${MAIN_CI_RUN_ID}" \
            --main-run-attempt "${MAIN_CI_RUN_ATTEMPT}" \
            --nonce "${EVIDENCE_NONCE}" \
            --workflow-trust artifacts/trust/release-workflow-trust.json \
            --owner-attestation "${RAGFLOW_OWNER_ATTESTATION_PATH}" \
            --owner-policy "${RAGFLOW_OWNER_POLICY_PATH}" \
            --owner-policy-sha256 "${RAGFLOW_OWNER_POLICY_SHA256}" \
            --deployment-attestation \
              artifacts/private/application-deployment-owner-attestation.json \
            --deployment-policy "${APPLICATION_DEPLOYMENT_OWNER_POLICY_PATH}" \
            --deployment-policy-sha256 "${APPLICATION_DEPLOYMENT_OWNER_POLICY_SHA256}" \
            --deployment-identity-sha256 "${APPLICATION_DEPLOYMENT_IDENTITY_SHA256}" \
            --output artifacts/private/ragflow-live-janitor.json

      - name: Reverify all signed sources and collect public evidence
        id: collect
        if: ${{ success() }}
        env:
          RAGFLOW_OWNER_ATTESTATION_PATH: ${{ vars.RAGFLOW_OWNER_ATTESTATION_PATH }}
          RAGFLOW_OWNER_POLICY_PATH: ${{ vars.RAGFLOW_OWNER_POLICY_PATH }}
          RAGFLOW_OWNER_POLICY_SHA256: ${{ vars.RAGFLOW_OWNER_POLICY_SHA256 }}
          APPLICATION_DEPLOYMENT_IDENTITY_SHA256: >-
            ${{ vars.APPLICATION_DEPLOYMENT_IDENTITY_SHA256 }}
          APPLICATION_DEPLOYMENT_OWNER_POLICY_PATH: >-
            ${{ vars.APPLICATION_DEPLOYMENT_OWNER_POLICY_PATH }}
          APPLICATION_DEPLOYMENT_OWNER_POLICY_SHA256: >-
            ${{ vars.APPLICATION_DEPLOYMENT_OWNER_POLICY_SHA256 }}
        run: |
          python scripts/collect_ragflow_live_evidence.py \
            --probe artifacts/private/ragflow-live-probe.json \
            --janitor artifacts/private/ragflow-live-janitor.json \
            --repository "${GITHUB_REPOSITORY}" \
            --git-sha "${GITHUB_SHA}" \
            --environment "${RELEASE_ENVIRONMENT}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --main-run-id "${MAIN_CI_RUN_ID}" \
            --main-run-attempt "${MAIN_CI_RUN_ATTEMPT}" \
            --nonce "${EVIDENCE_NONCE}" \
            --deployment-identity-sha256 "${APPLICATION_DEPLOYMENT_IDENTITY_SHA256}" \
            --owner-attestation "${RAGFLOW_OWNER_ATTESTATION_PATH}" \
            --owner-policy "${RAGFLOW_OWNER_POLICY_PATH}" \
            --owner-policy-sha256 "${RAGFLOW_OWNER_POLICY_SHA256}" \
            --deployment-attestation \
              artifacts/private/application-deployment-owner-attestation.json \
            --deployment-policy "${APPLICATION_DEPLOYMENT_OWNER_POLICY_PATH}" \
            --deployment-policy-sha256 "${APPLICATION_DEPLOYMENT_OWNER_POLICY_SHA256}" \
            --workflow-trust artifacts/trust/release-workflow-trust.json \
            --workflow-trust-checksum \
              artifacts/trust/release-workflow-trust.json.sha256 \
            --output-dir artifacts/ragflow

      - name: Remove private probe material
        id: scrub
        if: ${{ always() }}
        run: |
          python - <<'PY'
          from pathlib import Path

          directory = Path("artifacts/private")
          if directory.exists():
              for child in directory.iterdir():
                  if not child.is_file() or child.is_symlink():
                      raise SystemExit("unexpected private artifact entry")
                  child.unlink()
              directory.rmdir()
          PY

      - name: Upload protected RAGFlow evidence
        if: >-
          ${{ success() && steps.collect.outcome == 'success' &&
              steps.scrub.outcome == 'success' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: >-
            protected-ragflow-evidence-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ragflow
          if-no-files-found: error
          retention-days: 7
