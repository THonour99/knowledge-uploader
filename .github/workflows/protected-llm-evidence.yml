name: Protected LLM live evidence

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Protected environment owning the private nonbillable LLM endpoint
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      main_ci_run_id:
        description: Successful main CI run that built the immutable release artifact
        required: true
        type: string
      main_ci_run_attempt:
        description: Exact attempt of the successful main CI run
        required: true
        type: string
      nonce:
        description: Unique base64url nonce already bound by the endpoint owner attestation
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: protected-llm-evidence-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  collect-protected-llm-evidence:
    runs-on:
      - self-hosted
      - Linux
      - X64
      - protected-llm-evidence
    timeout-minutes: 10
    environment:
      name: ${{ inputs.environment }}
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
      RELEASE_ENVIRONMENT: ${{ inputs.environment }}
      MAIN_CI_RUN_ID: ${{ inputs.main_ci_run_id }}
      MAIN_CI_RUN_ATTEMPT: ${{ inputs.main_ci_run_attempt }}
      EVIDENCE_NONCE: ${{ inputs.nonce }}
    steps:
      - name: Checkout exact release revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up pinned Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ops/requirements-protected-llm-evidence.txt

      - name: Install hash-locked LLM evidence runtime
        run: >-
          python -m pip install --require-hashes --only-binary=:all:
          -r ops/requirements-protected-llm-evidence.txt

      - name: Verify protected ref and main CI provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/release_workflow_trust.py fetch \
            --repository "${GITHUB_REPOSITORY}" \
            --git-sha "${GITHUB_SHA}" \
            --ref "${GITHUB_REF}" \
            --ref-protected "${{ github.ref_protected }}" \
            --current-role llm_live \
            --current-run-id "${GITHUB_RUN_ID}" \
            --current-run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --current-workflow .github/workflows/protected-llm-evidence.yml \
            --main-run-id "${MAIN_CI_RUN_ID}" \
            --main-run-attempt "${MAIN_CI_RUN_ATTEMPT}" \
            --output artifacts/trust/release-workflow-trust.json

      - name: Prepare new private and public evidence directories
        run: |
          python - <<'PY'
          from pathlib import Path

          Path("artifacts/private").mkdir(parents=True, exist_ok=False)
          PY

      - name: Run one owner-authorized private LLM probe
        env:
          PROTECTED_LLM_BASE_URL: ${{ secrets.PROTECTED_LLM_BASE_URL }}
          PROTECTED_LLM_API_KEY: ${{ secrets.PROTECTED_LLM_API_KEY }}
          PROTECTED_LLM_MODEL: ${{ secrets.PROTECTED_LLM_MODEL }}
          PROTECTED_LLM_TLS_SPKI_PIN: ${{ vars.PROTECTED_LLM_TLS_SPKI_PIN }}
          PROTECTED_LLM_OWNER_ATTESTATION_PATH: ${{ vars.PROTECTED_LLM_OWNER_ATTESTATION_PATH }}
          PROTECTED_LLM_OWNER_POLICY_PATH: ${{ vars.PROTECTED_LLM_OWNER_POLICY_PATH }}
          PROTECTED_LLM_OWNER_POLICY_SHA256: ${{ vars.PROTECTED_LLM_OWNER_POLICY_SHA256 }}
        run: |
          python -m scripts.run_llm_live_probe \
            --environment "${RELEASE_ENVIRONMENT}" \
            --repository "${GITHUB_REPOSITORY}" \
            --git-sha "${GITHUB_SHA}" \
            --nonce "${EVIDENCE_NONCE}" \
            --workflow-run-id "${GITHUB_RUN_ID}" \
            --workflow-run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --main-ci-run-id "${MAIN_CI_RUN_ID}" \
            --main-ci-run-attempt "${MAIN_CI_RUN_ATTEMPT}" \
            --owner-attestation "${PROTECTED_LLM_OWNER_ATTESTATION_PATH}" \
            --owner-policy "${PROTECTED_LLM_OWNER_POLICY_PATH}" \
            --expected-owner-policy-sha256 "${PROTECTED_LLM_OWNER_POLICY_SHA256}" \
            --workflow-trust artifacts/trust/release-workflow-trust.json \
            --output artifacts/private/llm-live-probe.json

      - name: Revalidate and collect hash-only LLM evidence
        env:
          PROTECTED_LLM_OWNER_ATTESTATION_PATH: ${{ vars.PROTECTED_LLM_OWNER_ATTESTATION_PATH }}
          PROTECTED_LLM_OWNER_POLICY_PATH: ${{ vars.PROTECTED_LLM_OWNER_POLICY_PATH }}
          PROTECTED_LLM_OWNER_POLICY_SHA256: ${{ vars.PROTECTED_LLM_OWNER_POLICY_SHA256 }}
        run: |
          python -m scripts.collect_llm_live_evidence \
            --environment "${RELEASE_ENVIRONMENT}" \
            --repository "${GITHUB_REPOSITORY}" \
            --git-sha "${GITHUB_SHA}" \
            --nonce "${EVIDENCE_NONCE}" \
            --workflow-run-id "${GITHUB_RUN_ID}" \
            --workflow-run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --main-ci-run-id "${MAIN_CI_RUN_ID}" \
            --main-ci-run-attempt "${MAIN_CI_RUN_ATTEMPT}" \
            --probe-receipt artifacts/private/llm-live-probe.json \
            --owner-attestation "${PROTECTED_LLM_OWNER_ATTESTATION_PATH}" \
            --owner-policy "${PROTECTED_LLM_OWNER_POLICY_PATH}" \
            --expected-owner-policy-sha256 "${PROTECTED_LLM_OWNER_POLICY_SHA256}" \
            --workflow-trust artifacts/trust/release-workflow-trust.json \
            --workflow-trust-checksum artifacts/trust/release-workflow-trust.json.sha256 \
            --output-dir artifacts/llm

      - name: Upload protected LLM evidence
        if: ${{ success() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: protected-llm-evidence-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/llm
          if-no-files-found: error
          retention-days: 7
