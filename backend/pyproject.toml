[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.per-file-ignores]
"app/modules/audit/service.py" = ["TID251"]
"app/modules/auth/api.py" = ["TID251"]
"app/modules/auth/service.py" = ["TID251"]
"app/modules/user/api.py" = ["TID251"]
"app/modules/user/service.py" = ["TID251"]

[tool.ruff.format]
quote-style = "double"
line-ending = "lf"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["app/tests"]
pythonpath = ["."]

[tool.mypy]
python_version = "3.11"
strict = true
plugins = ["pydantic.mypy"]
files = ["app"]
warn_unused_configs = true

[[tool.mypy.overrides]]
module = ["celery", "celery.*", "kombu", "kombu.*"]
ignore_missing_imports = true
