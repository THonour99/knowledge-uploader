x-protected-minio-client-environment: &protected-minio-client-environment
  MINIO_SECURE: "true"
  MINIO_CA_CERT_FILE: /run/secrets/minio-ca/ca.crt

x-protected-minio-client-volumes: &protected-minio-client-volumes
  - "${MINIO_TLS_DIR:?MINIO_TLS_DIR is required}/ca.crt:/run/secrets/minio-ca/ca.crt:ro"

services:
  minio:
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
    volumes:
      - "${MINIO_TLS_DIR:?MINIO_TLS_DIR is required}/public.crt:/root/.minio/certs/public.crt:ro"
      - "${MINIO_TLS_DIR:?MINIO_TLS_DIR is required}/private.key:/root/.minio/certs/private.key:ro"
      - "${MINIO_TLS_DIR:?MINIO_TLS_DIR is required}/ca.crt:/root/.minio/certs/CAs/protected-ca.crt:ro"
    healthcheck:
      test:
        - CMD-SHELL
        - "curl --fail --silent --show-error --cacert /root/.minio/certs/CAs/protected-ca.crt https://minio:9000/minio/health/cluster >/dev/null"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  minio-bootstrap:
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      MINIO_SECURE: "true"
      MINIO_CA_CERT_FILE: /run/secrets/minio-ca/ca.crt
      SSL_CERT_FILE: /run/secrets/minio-ca/ca.crt
    volumes:
      - "${MINIO_TLS_DIR:?MINIO_TLS_DIR is required}/ca.crt:/run/secrets/minio-ca/ca.crt:ro"

  minio-metrics-token-init:
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      MINIO_SECURE: "true"
      MINIO_CA_CERT_FILE: /run/secrets/minio-ca/ca.crt
      SSL_CERT_FILE: /run/secrets/minio-ca/ca.crt
    volumes:
      - "${MINIO_TLS_DIR:?MINIO_TLS_DIR is required}/ca.crt:/run/secrets/minio-ca/ca.crt:ro"

  rabbitmq-topology:
    environment: *protected-minio-client-environment
    volumes: *protected-minio-client-volumes

  backend-api:
    environment: *protected-minio-client-environment
    volumes: *protected-minio-client-volumes

  outbox-dispatcher:
    environment: *protected-minio-client-environment
    volumes: *protected-minio-client-volumes

  operational-metrics:
    environment: *protected-minio-client-environment
    volumes: *protected-minio-client-volumes

  worker-document:
    environment: *protected-minio-client-environment
    volumes: *protected-minio-client-volumes

  worker-ai:
    environment: *protected-minio-client-environment
    volumes: *protected-minio-client-volumes

  worker-ragflow:
    environment: *protected-minio-client-environment
    volumes: *protected-minio-client-volumes

  worker-notification:
    environment: *protected-minio-client-environment
    volumes: *protected-minio-client-volumes

  scheduler:
    environment: *protected-minio-client-environment
    volumes: *protected-minio-client-volumes

  prometheus:
    volumes:
      - "${PROMETHEUS_CONFIG_FILE:?PROMETHEUS_CONFIG_FILE is required}:/etc/prometheus/prometheus.yml:ro"
      - "${MINIO_TLS_DIR:?MINIO_TLS_DIR is required}/ca.crt:/etc/prometheus/tls/ca.crt:ro"
