name: knowledge-uploader

x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile
  target: "${BACKEND_BUILD_TARGET:-runtime}"
  args:
    PYTHON_IMAGE: "${PYTHON_IMAGE:-python:3.11-slim-bookworm}"
    MINIO_MC_IMAGE: "${MINIO_MC_IMAGE:-minio/mc:RELEASE.2024-04-18T16-45-29Z@sha256:5a84109d6b29bab96c3122e4a7ba888fbf48d4cdc83bc8bf88e3a7ac67b970b8}"
    VCS_REF: "${VCS_REF:-unknown}"

x-app-environment: &app-environment
  APP_NAME: "${APP_NAME:-knowledge-uploader}"
  APP_ENV: "${APP_ENV:-development}"
  APP_BASE_URL: "${APP_BASE_URL:-http://localhost}"
  DEPENDENCY_CHECK_TIMEOUT_SECONDS: "${DEPENDENCY_CHECK_TIMEOUT_SECONDS:-3}"
  JWT_SECRET: "${JWT_SECRET:-change-me-change-me-change-me-change-me}"
  ENCRYPTION_KEY: "${ENCRYPTION_KEY:-RZ1Sw_27VrN9c5Cfsq01qiwViwT6y7jDCuXYn7tgGJY=}"
  PYTHONUTF8: "${PYTHONUTF8:-1}"
  UVICORN_FORWARDED_ALLOW_IPS: "${UVICORN_FORWARDED_ALLOW_IPS:-127.0.0.1}"
  POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
  POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
  POSTGRES_DB: "${POSTGRES_DB:-knowledge_uploader}"
  POSTGRES_USER: "${POSTGRES_USER:-knowledge}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-knowledge_password}"
  DATABASE_URL: "${DATABASE_URL:-postgresql+asyncpg://knowledge:knowledge_password@postgres:5432/knowledge_uploader}"
  ALEMBIC_DATABASE_URL: "${ALEMBIC_DATABASE_URL:-postgresql+psycopg://knowledge:knowledge_password@postgres:5432/knowledge_uploader}"
  RABBITMQ_HOST: "${RABBITMQ_HOST:-rabbitmq}"
  RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
  RABBITMQ_USER: "${RABBITMQ_USER:-knowledge}"
  RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-knowledge_password}"
  CELERY_BROKER_URL: "${CELERY_BROKER_URL:-amqp://knowledge:knowledge_password@rabbitmq:5672//}"
  REDIS_HOST: "${REDIS_HOST:-redis}"
  REDIS_PORT: "${REDIS_PORT:-6379}"
  REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
  CACHE_REDIS_URL: "${CACHE_REDIS_URL:-redis://redis:6379/1}"
  MINIO_ENDPOINT: "${MINIO_ENDPOINT:-minio:9000}"
  MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-knowledge}"
  MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-knowledge_password}"
  MINIO_BUCKET: "${MINIO_BUCKET:-knowledge-files}"
  MINIO_SECURE: "${MINIO_SECURE:-false}"
  MINIO_CA_CERT_FILE: "${MINIO_CA_CERT_FILE:-}"
  UPLOAD_MAX_FILE_SIZE_BYTES: "${UPLOAD_MAX_FILE_SIZE_BYTES:-52428800}"
  UPLOAD_RATE_LIMIT_PER_MINUTE: "${UPLOAD_RATE_LIMIT_PER_MINUTE:-10}"
  UPLOAD_ALLOWED_EXTENSIONS: "${UPLOAD_ALLOWED_EXTENSIONS:-pdf,docx,xlsx,pptx,txt,md,csv}"
  UPLOAD_ALLOWED_MIME_TYPES: "${UPLOAD_ALLOWED_MIME_TYPES:-application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.openxmlformats-officedocument.presentationml.presentation,text/plain,text/markdown,text/csv}"
  RAGFLOW_BASE_URL: "${RAGFLOW_BASE_URL:-http://ragflow:9380}"
  RAGFLOW_ALLOWED_BASE_URLS: "${RAGFLOW_ALLOWED_BASE_URLS:-}"
  RAGFLOW_API_KEY: "${RAGFLOW_API_KEY:-}"
  RAGFLOW_ALLOWED_DATASET_IDS: "${RAGFLOW_ALLOWED_DATASET_IDS:-}"
  RAGFLOW_REQUEST_TIMEOUT: "${RAGFLOW_REQUEST_TIMEOUT:-300}"
  RAGFLOW_MAX_RETRY_COUNT: "${RAGFLOW_MAX_RETRY_COUNT:-3}"
  RAGFLOW_PARSE_POLL_TIMEOUT_SECONDS: "${RAGFLOW_PARSE_POLL_TIMEOUT_SECONDS:-3600}"
  ALLOW_REGISTER: "${ALLOW_REGISTER:-true}"
  REQUIRE_EMAIL_VERIFICATION: "${REQUIRE_EMAIL_VERIFICATION:-false}"
  ALLOWED_EMAIL_DOMAINS: "${ALLOWED_EMAIL_DOMAINS:-company.com,corp.company.com}"
  PASSWORD_MIN_LENGTH: "${PASSWORD_MIN_LENGTH:-8}"
  LOGIN_MAX_FAILED_ATTEMPTS: "${LOGIN_MAX_FAILED_ATTEMPTS:-5}"
  LOGIN_LOCK_MINUTES: "${LOGIN_LOCK_MINUTES:-15}"
  EMAIL_VERIFICATION_EXPIRE_HOURS: "${EMAIL_VERIFICATION_EXPIRE_HOURS:-24}"
  PASSWORD_RESET_EXPIRE_MINUTES: "${PASSWORD_RESET_EXPIRE_MINUTES:-30}"
  JWT_EXPIRE_MINUTES: "${JWT_EXPIRE_MINUTES:-1440}"
  AI_ANALYSIS_ENABLED: "${AI_ANALYSIS_ENABLED:-true}"
  ALLOW_EXTERNAL_LLM: "${ALLOW_EXTERNAL_LLM:-false}"
  LLM_PROVIDER: "${LLM_PROVIDER:-disabled}"
  LLM_BASE_URL: "${LLM_BASE_URL:-}"
  LLM_ALLOWED_BASE_URLS: "${LLM_ALLOWED_BASE_URLS:-}"
  LLM_API_KEY: "${LLM_API_KEY:-}"
  LLM_MODEL: "${LLM_MODEL:-}"
  AI_REQUEST_TIMEOUT: "${AI_REQUEST_TIMEOUT:-120}"
  AI_MAX_RETRY_COUNT: "${AI_MAX_RETRY_COUNT:-3}"
  SMTP_HOST: "${SMTP_HOST:-}"
  SMTP_PORT: "${SMTP_PORT:-587}"
  SMTP_USER: "${SMTP_USER:-}"
  SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
  SMTP_FROM: "${SMTP_FROM:-}"
  SMTP_TLS: "${SMTP_TLS:-true}"
  SMTP_CA_CERT_FILE: "${SMTP_CA_CERT_FILE:-}"
  SMTP_TIMEOUT_SECONDS: "${SMTP_TIMEOUT_SECONDS:-10}"
  DOCUMENT_QUEUE: "document_queue"
  AI_QUEUE: "ai_queue"
  RAGFLOW_QUEUE: "ragflow_queue"
  NOTIFICATION_QUEUE: "notification_queue"
  OUTBOX_METRICS_PORT: "${OUTBOX_METRICS_PORT:-9101}"
  OPERATIONAL_METRICS_PORT: "${OPERATIONAL_METRICS_PORT:-9102}"
  OPERATIONAL_METRICS_INTERVAL_SECONDS: "${OPERATIONAL_METRICS_INTERVAL_SECONDS:-30}"
  OPERATIONAL_READY_URL: "http://backend-api:8000/api/system/ready"

x-backend-depends: &backend-depends
  postgres:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy
  redis:
    condition: service_healthy
  minio:
    condition: service_healthy
  minio-bootstrap:
    condition: service_completed_successfully
  rabbitmq-topology:
    condition: service_completed_successfully

x-backend-service: &backend-service
  image: "${BACKEND_IMAGE:-knowledge-uploader-backend:dev}"
  build: *backend-build
  environment: *app-environment
  depends_on: *backend-depends
  networks:
    - knowledge-uploader
  restart: unless-stopped

services:
  rabbitmq-topology:
    image: "${BACKEND_IMAGE:-knowledge-uploader-backend:dev}"
    build: *backend-build
    environment: *app-environment
    depends_on:
      rabbitmq:
        condition: service_healthy
    command:
      - python
      - -m
      - app.workers.rabbitmq_topology
    networks:
      - knowledge-uploader
    restart: "no"

  nginx:
    image: nginx:1.25-alpine
    depends_on:
      frontend:
        condition: service_started
      backend-api:
        condition: service_started
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - knowledge-uploader
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: "${FRONTEND_IMAGE:-knowledge-uploader-frontend:dev}"
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: "${NODE_IMAGE:-node:20-alpine}"
        NGINX_IMAGE: "${NGINX_IMAGE:-nginx:1.25-alpine}"
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-/api}"
        VCS_REF: "${VCS_REF:-unknown}"
    expose:
      - "80"
    networks:
      - knowledge-uploader
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend-api:
    <<: *backend-service
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --proxy-headers
      - --forwarded-allow-ips
      - "${UVICORN_FORWARDED_ALLOW_IPS:-127.0.0.1}"
    ports:
      - "${BACKEND_API_HOST:-127.0.0.1}:${BACKEND_API_PORT:-18000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/system/ready', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  outbox-dispatcher:
    <<: *backend-service
    command:
      - python
      - -m
      - app.workers.outbox_dispatcher
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import app\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  operational-metrics:
    <<: *backend-service
    environment:
      <<: *app-environment
      # Deliberately inert: this service reads MinIO metrics only through the bearer file.
      MINIO_ACCESS_KEY: "metrics-bearer-only-no-data-plane"
      MINIO_SECRET_KEY: "metrics-bearer-only-no-data-plane"
      MINIO_METRICS_BEARER_TOKEN_FILE: "/run/secrets/minio-metrics/token"
    command:
      - python
      - -m
      - app.workers.operational_metrics
    depends_on:
      <<: *backend-depends
      backend-api:
        condition: service_healthy
      minio-metrics-token-init:
        condition: service_completed_successfully
    volumes:
      - minio-metrics-auth:/run/secrets/minio-metrics:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9102/metrics', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker-document:
    <<: *backend-service
    command:
      - celery
      - -A
      - app.workers.celery_app
      - worker
      - --loglevel=info
      - --queues=document_queue
      - --hostname=worker-document@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout=10 | grep -q worker-document@"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 40s

  worker-ai:
    <<: *backend-service
    command:
      - celery
      - -A
      - app.workers.celery_app
      - worker
      - --loglevel=info
      - --queues=ai_queue
      - --hostname=worker-ai@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout=10 | grep -q worker-ai@"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 40s

  worker-ragflow:
    <<: *backend-service
    command:
      - celery
      - -A
      - app.workers.celery_app
      - worker
      - --loglevel=info
      - --queues=ragflow_queue
      - --hostname=worker-ragflow@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout=10 | grep -q worker-ragflow@"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 40s

  worker-notification:
    <<: *backend-service
    command:
      - celery
      - -A
      - app.workers.celery_app
      - worker
      - --loglevel=info
      - --queues=notification_queue
      - --hostname=worker-notification@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout=10 | grep -q worker-notification@"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 40s

  scheduler:
    <<: *backend-service
    command:
      - celery
      - -A
      - app.workers.celery_app
      - beat
      - --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import app.workers.celery_app\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-knowledge_uploader}"
      POSTGRES_USER: "${POSTGRES_USER:-knowledge}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-knowledge_password}"
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - knowledge-uploader
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-knowledge}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:-knowledge_password}"
      RABBITMQ_DEFAULT_VHOST: "/"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - knowledge-uploader
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    command:
      - sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD}" ]; then
          redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
        else
          redis-server --appendonly yes
        fi
    volumes:
      - redis-data:/data
    networks:
      - knowledge-uploader
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG; else redis-cli ping | grep -q PONG; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: "${MINIO_SERVER_IMAGE:-minio/minio:RELEASE.2024-04-18T19-09-19Z@sha256:036a068d7d6b69400da6bc07a480bee1e241ef3c341c41d988ed11f520f85124}"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-knowledge-root}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-knowledge_root_password}"
      MINIO_PROMETHEUS_AUTH_TYPE: jwt
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    volumes:
      - minio-data:/data
    networks:
      - knowledge-uploader
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/cluster || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  minio-bootstrap:
    image: "${BACKEND_IMAGE:-knowledge-uploader-backend:dev}"
    entrypoint:
      - python
      - -m
      - scripts.minio_bootstrap
    environment:
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-minio:9000}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-knowledge-root}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-knowledge_root_password}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-knowledge}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-knowledge_password}"
      MINIO_BUCKET: "${MINIO_BUCKET:-knowledge-files}"
      MINIO_SECURE: "${MINIO_SECURE:-false}"
      MINIO_CA_CERT_FILE: "${MINIO_CA_CERT_FILE:-}"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - knowledge-uploader
    restart: "no"

  minio-metrics-token-init:
    image: "${BACKEND_IMAGE:-knowledge-uploader-backend:dev}"
    entrypoint:
      - python
      - -m
      - scripts.minio_metrics_token_init
    environment:
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-minio:9000}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-knowledge-root}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-knowledge_root_password}"
      MINIO_SECURE: "${MINIO_SECURE:-false}"
      MINIO_CA_CERT_FILE: "${MINIO_CA_CERT_FILE:-}"
    depends_on:
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    volumes:
      - minio-metrics-auth:/run/secrets/minio-metrics
    networks:
      - knowledge-uploader
    restart: "no"

networks:
  knowledge-uploader:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  minio-data:
  minio-metrics-auth:
