global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: knowledge-uploader-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend-api:8000

  - job_name: knowledge-uploader-outbox
    metrics_path: /metrics
    static_configs:
      - targets:
          - outbox-dispatcher:9101

  - job_name: knowledge-uploader-operations
    metrics_path: /metrics
    static_configs:
      - targets:
          - operational-metrics:9102

  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets:
          - rabbitmq:15692

  - job_name: rabbitmq-detailed
    metrics_path: /metrics/detailed
    params:
      family:
        - queue_coarse_metrics
        - queue_consumer_count
    static_configs:
      - targets:
          - rabbitmq:15692

  - job_name: minio
    authorization:
      type: Bearer
      credentials_file: /run/secrets/minio-metrics/token
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets:
          - minio:9000

  - job_name: backup-textfile
    metrics_path: /metrics
    static_configs:
      - targets:
          - backup-metrics:9100

  - job_name: linux-host
    metrics_path: /metrics
    static_configs:
      - targets:
          - host-node-exporter:9100
